name: checks

on:
  - push
  - pull_request
  - workflow_call

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm install
      - name: Run lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm install
      - name: Run typecheck
        run: npm run typecheck

  test-unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [24]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: npm install
      - name: Run unit tests with coverage gate (SQLite only)
        run: SKIP_DOCKER_TESTS=1 npm test

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck]
    env:
      SKIP_DOCKER_TESTS: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm install
      - name: Run DB matrix (SQLite/PG/MySQL) x3 for stability
        run: |
          for i in 1 2 3; do
            echo "=== Integration run $i ==="
            npm run quick:test
          done

  e2e-configure:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm install
      - name: Build package
        run: npm run build
      - name: Verify package exports resolve
        run: npm run verify:exports
      - name: E2E configure smoke test
        run: bash scripts/e2e-configure.sh
