name: Bug report
description: Report a reproducible bug or regression
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: Package version
      description: The version of `@rikology/adonisjs-audit-trail` where you see the bug.
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 24.5.0
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite
        - PostgreSQL
        - MySQL
        - Other / not applicable
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Steps, code, or a link to a repository that reproduces the issue.
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: text
